<!DOCTYPE html>
<!--
  Source art-board for images/brand/og-image.jpg (1200x630 social card).
  Regenerate with:
    chrome --headless --screenshot=og.png --window-size=1200,630 --hide-scrollbars --virtual-time-budget=10000 file://$(pwd)/images/brand/og-image.html
    sips -s format jpeg -s formatOptions 90 og.png --out images/brand/og-image.jpg
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Chivo+Mono:wght@500&family=Karla:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(ellipse 900px 420px at 50% 108%, rgba(240, 180, 41, 0.16), rgba(217, 119, 66, 0.05) 45%, transparent 72%),
      linear-gradient(180deg, #0b130d 0%, #15271b 62%, #101b12 100%);
    font-family: 'Karla', sans-serif;
  }

  svg.topo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .topo path {
    fill: none;
    stroke: #9aa893;
    stroke-width: 1.2;
  }

  .content {
    position: absolute;
    left: 84px;
    top: 96px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: 'Chivo Mono', monospace;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.22em;
    color: #9aa893;
    border: 1px solid #24382a;
    border-radius: 4px;
    background: rgba(12, 21, 14, 0.6);
    padding: 12px 20px;
    margin-bottom: 34px;
  }

  .eyebrow svg { width: 15px; height: 20px; fill: #f0b429; }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 148px;
    line-height: 0.88;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: #efead8;
  }

  h1 span { color: #f0b429; }

  .sub {
    margin-top: 30px;
    font-size: 26px;
    line-height: 1.5;
    color: #9aa893;
    max-width: 640px;
  }

  .domain {
    position: absolute;
    right: 84px;
    top: 108px;
    font-family: 'Chivo Mono', monospace;
    font-size: 17px;
    letter-spacing: 0.14em;
    color: #6e7d6b;
  }

  .treeline {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
  }

  .treeline svg { display: block; width: 100%; height: 96px; }
  .treeline use { fill: #0c150e; }
</style>
</head>
<body>

  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <defs>
      <symbol id="pine" viewBox="0 0 24 32">
        <path d="M12 1 L18.5 10.5 H15.5 L21 19 H17.5 L23 27 H13.6 V31 H10.4 V27 H1 L6.5 19 H3 L8.5 10.5 H5.5 Z"/>
      </symbol>
    </defs>
  </svg>

  <svg class="topo" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
    <path opacity="0.13" d="M-40,110 C160,60 300,150 500,105 S820,40 1020,100 1240,85 1260,70"/>
    <path opacity="0.10" d="M-40,170 C150,125 310,215 510,170 S800,105 1000,165 1230,150 1260,135"/>

    <path opacity="0.045" d="M-40,410 C220,365 370,455 570,410 S740,370 940,430 1200,410 1260,395"/>

  <p class="domain">rivian-essentials.com</p>

  <div class="content">

    <p class="sub">Curated recovery, camp, cargo &amp; charging gear for the R1T, R1S, and R2.</p>

      <rect x="0" y="78" width="1200" height="2" fill="#0c150e"/>

  </div>

</body>
</html>
